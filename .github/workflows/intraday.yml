name: Intraday Snapshot

on:
  schedule:
    # 毎時0分、0〜14時 UTC 月〜金 = 9:00〜23:00 JST 月〜金（1時間ごと）
    - cron: "0 0-14 * * 1-5"
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node intraday.js

      - name: Build GPT feed
        run: node build-feed.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json data/gpt-feed.html
          git diff --cached --quiet || git commit -m "intraday: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
