name: Intraday Snapshot

on:
  schedule:
    # 早朝枠: 6:53, 7:23, 7:53, 8:23, 8:53 JST(火〜土) — 9時までに5回試行
    - cron: "23,53 22-23 * * 1-5"
    # 日中枠: 9:13〜23:43 JST(月〜金) 30分ごと(従来通り)
    - cron: "13,43 0-14 * * 1-5"
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch intraday quotes
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node intraday.js

      - name: Build GPT feed
        run: node build-feed.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/intraday.json data/economic-calendar.json data/gpt-feed.html data/gpt-feed.txt data/feed.csv data/history.csv
          git diff --cached --quiet || git commit -m "intraday: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push
