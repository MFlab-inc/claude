<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FX Daily Levels</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --gold: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px;
    margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  h1 { font-size: 1.3rem; font-weight: 600; }
  .meta { color: var(--muted); font-size: 0.85rem; }
  h2 {
    font-size: 1rem; font-weight: 600; color: var(--muted);
    margin: 24px 0 10px; letter-spacing: 0.05em;
  }
  /* 市場心理 */
  .sentiment-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
  .s-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px;
  }
  .s-card .label { color: var(--muted); font-size: 0.8rem; }
  .s-card .value { font-size: 1.5rem; font-weight: 700; margin-top: 2px; }
  .s-card .chg { font-size: 0.85rem; margin-top: 2px; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  /* ペアカード */
  .pair-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .p-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px;
  }
  .p-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
  .p-name { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.03em; }
  .p-close { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
  .p-close small { color: var(--muted); font-size: 0.7rem; font-weight: 400; margin-right: 4px; }
  table.levels { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  table.levels td { padding: 4px 2px; border-bottom: 1px solid #21262d; }
  table.levels td:first-child { color: var(--muted); }
  table.levels td:last-child { text-align: right; font-variant-numeric: tabular-nums; font-weight: 500; }
  table.levels tr:last-child td { border-bottom: none; }
  .r1 { color: var(--green); }
  .s1 { color: var(--red); }
  .pv { color: var(--gold); }
  .pips { color: var(--muted); font-size: 0.78rem; font-weight: 400; }
  /* 履歴 */
  .hist-controls { margin-bottom: 10px; }
  select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 0.9rem;
  }
  .hist-wrap { overflow-x: auto; }
  table.hist {
    width: 100%; border-collapse: collapse; font-size: 0.85rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  }
  table.hist th, table.hist td { padding: 7px 10px; text-align: right; border-bottom: 1px solid #21262d; font-variant-numeric: tabular-nums; }
  table.hist th { color: var(--muted); font-weight: 500; font-size: 0.78rem; }
  table.hist th:first-child, table.hist td:first-child { text-align: left; }
  /* イベント */
  .event-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; overflow: hidden;
  }
  .event-box iframe { width: 100%; border: none; background: #fff; border-radius: 4px; }
  .link-btn {
    display: inline-block; margin-top: 8px; padding: 6px 14px;
    background: transparent; border: 1px solid var(--accent); color: var(--accent);
    border-radius: 6px; text-decoration: none; font-size: 0.85rem;
  }
  .link-btn:hover { background: rgba(88,166,255,0.1); }
  .error-banner {
    background: rgba(248,81,73,0.1); border: 1px solid var(--red); color: var(--red);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 0.88rem;
    display: none;
  }
  .loading { color: var(--muted); padding: 20px; text-align: center; }
</style>
</head>
<body>

<header>
  <h1>FX Daily Levels</h1>
  <span class="meta" id="meta-date">読み込み中...</span>
</header>

<div class="error-banner" id="error-banner"></div>

<h2>市場心理</h2>
<div class="sentiment-row" id="sentiment"><div class="loading">読み込み中...</div></div>

<h2>デイリーレベル（前日確定足ベース）</h2>
<div class="pair-grid" id="pairs"><div class="loading">読み込み中...</div></div>

<h2>履歴</h2>
<div class="hist-controls">
  <select id="hist-pair"></select>
</div>
<div class="hist-wrap"><table class="hist" id="hist-table"></table></div>

<h2>本日の経済指標・要人発言（JST）</h2>
<div class="event-box">
  <!--
    ▼ investing.com 公式ウィジェット ▼
    表示言語やタイムゾーンが合わない場合は、以下のページで公式の埋め込みコードを
    生成し、この <iframe> を丸ごと差し替えてください（SETUP.md 手順7参照）:
    https://jp.investing.com/webmaster-tools/economic-calendar
  -->
 <iframe src="https://sslecal2.investing.com?columns=exc_flags,exc_currency,exc_importance,exc_actual,exc_forecast,exc_previous&category=_employment,_economicActivity,_inflation,_credit,_centralBanks,_confidenceIndex,_balance,_Bonds&importance=2,3&features=datepicker,timezone,timeselector&countries=5,4,25,6,12,17,72,37,35&calType=day&timeZone=29&lang=11" width="650" height="467" frameborder="0" allowtransparency="true" marginwidth="0" marginheight="0"></iframe><div class="poweredBy" style="font-family: Arial, Helvetica, sans-serif;"><span style="font-size: 11px;color: #333333;text-decoration: none;">金融ポータルサイト、<a href="https://jp.investing.com/" rel="nofollow" target="_blank" style="font-size: 11px;color: #06529D; font-weight: bold;" class="underline_link">Investing.com 日本</a>によって提供されている経済カレンダー</span></div>
  <div>
    <a class="link-btn" href="https://fxshihyo.com/" target="_blank" rel="noopener">fxshihyo.com で確認 →</a>
  </div>
</div>

<script>
const PAIR_ORDER = ["USDJPY","EURUSD","GBPUSD","EURJPY","AUDUSD","EURGBP","XAUUSD"];
const SENT_ORDER = ["DXY","US10Y","VIX"];
const HIST_DAYS = 15;
let historyCache = {}; // date -> daily json

function fmt(n, code) {
  if (n === null || n === undefined) return "-";
  return n.toLocaleString("en-US", { minimumFractionDigits: dec(code), maximumFractionDigits: dec(code) });
}
function dec(code) {
  if (code === "USDJPY" || code === "EURJPY") return 3;
  if (code === "XAUUSD") return 2;
  return 5;
}

async function loadJSON(path) {
  const res = await fetch(path + "?t=" + Date.now()); // キャッシュ回避
  if (!res.ok) throw new Error(`${path}: HTTP ${res.status}`);
  return res.json();
}

function renderSentiment(data) {
  const el = document.getElementById("sentiment");
  el.innerHTML = "";
  for (const code of SENT_ORDER) {
    const s = data.sentiment?.[code];
    const div = document.createElement("div");
    div.className = "s-card";
    if (!s) {
      div.innerHTML = `<div class="label">${code}</div><div class="value">-</div><div class="chg">取得失敗</div>`;
    } else {
      const cls = s.change >= 0 ? "up" : "down";
      const sign = s.change >= 0 ? "+" : "";
      const suffix = code === "US10Y" ? "%" : "";
      div.innerHTML = `
        <div class="label">${s.label}（${code}）</div>
        <div class="value">${s.value}${suffix}</div>
        <div class="chg ${cls}">${sign}${s.change}（${sign}${s.changePct}%）</div>`;
    }
    el.appendChild(div);
  }
}

function renderPairs(data) {
  const el = document.getElementById("pairs");
  el.innerHTML = "";
  for (const code of PAIR_ORDER) {
    const p = data.pairs?.[code];
    const div = document.createElement("div");
    div.className = "p-card";
    if (!p) {
      div.innerHTML = `<div class="p-head"><span class="p-name">${code}</span></div><div class="loading">取得失敗</div>`;
      el.appendChild(div);
      continue;
    }
    const pips = (v, pv) => pv !== null && pv !== undefined ? ` <span class="pips">(${pv}p)</span>` : "";
    div.innerHTML = `
      <div class="p-head">
        <span class="p-name">${code}</span>
        <span class="p-close"><small>NY終値</small>${fmt(p.prevClose, code)}</span>
      </div>
      <table class="levels">
        <tr><td>前日高値</td><td>${fmt(p.prevHigh, code)}</td></tr>
        <tr><td>前日安値</td><td>${fmt(p.prevLow, code)}</td></tr>
        <tr><td class="r1">R1</td><td class="r1">${fmt(p.r1, code)}</td></tr>
        <tr><td class="pv">Pivot</td><td class="pv">${fmt(p.pivot, code)}</td></tr>
        <tr><td class="s1">S1</td><td class="s1">${fmt(p.s1, code)}</td></tr>
        <tr><td>ADR(20)</td><td>${fmt(p.adr20, code)}${pips(p.adr20, p.adr20Pips)}</td></tr>
        <tr><td>ATR(14)</td><td>${fmt(p.atr14, code)}${pips(p.atr14, p.atr14Pips)}</td></tr>
      </table>`;
    el.appendChild(div);
  }
}

async function renderHistory(pairCode) {
  const table = document.getElementById("hist-table");
  table.innerHTML = `<tr><td class="loading">読み込み中...</td></tr>`;
  try {
    const idx = await loadJSON("data/index.json");
    const dates = (idx.dates || []).slice(0, HIST_DAYS);
    const rows = await Promise.all(dates.map(async (d) => {
      if (!historyCache[d]) {
        try { historyCache[d] = await loadJSON(`data/${d}.json`); } catch { historyCache[d] = null; }
      }
      return { date: d, data: historyCache[d] };
    }));
    let html = `<tr><th>日付</th><th>NY終値</th><th>高値</th><th>安値</th><th>ADR20</th><th>ATR14</th><th>Pivot</th></tr>`;
    for (const r of rows) {
      const p = r.data?.pairs?.[pairCode];
      if (!p) { html += `<tr><td>${r.date}</td><td colspan="6" style="color:var(--muted)">データなし</td></tr>`; continue; }
      html += `<tr>
        <td>${r.date}</td>
        <td>${fmt(p.prevClose, pairCode)}</td>
        <td>${fmt(p.prevHigh, pairCode)}</td>
        <td>${fmt(p.prevLow, pairCode)}</td>
        <td>${fmt(p.adr20, pairCode)}</td>
        <td>${fmt(p.atr14, pairCode)}</td>
        <td>${fmt(p.pivot, pairCode)}</td>
      </tr>`;
    }
    table.innerHTML = html;
  } catch (e) {
    table.innerHTML = `<tr><td class="loading">履歴の読み込みに失敗しました（${e.message}）</td></tr>`;
  }
}

async function init() {
  // 履歴セレクタ
  const sel = document.getElementById("hist-pair");
  for (const c of PAIR_ORDER) {
    const o = document.createElement("option");
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  }
  sel.addEventListener("change", () => renderHistory(sel.value));

  try {
    const data = await loadJSON("data/latest.json");
    document.getElementById("meta-date").textContent =
      `${data.date}（前日足: ${data.sessionDate} NYクローズ）`;
    if (data.errors && data.errors.length > 0) {
      const b = document.getElementById("error-banner");
      b.style.display = "block";
      b.textContent = "一部データの取得に失敗しています: " + data.errors.join(" / ");
    }
    renderSentiment(data);
    renderPairs(data);
    renderHistory(sel.value);
  } catch (e) {
    document.getElementById("meta-date").textContent = "データ未生成";
    const b = document.getElementById("error-banner");
    b.style.display = "block";
    b.textContent =
      "data/latest.json が見つかりません。GitHub Actionsをまだ実行していない場合は、" +
      "リポジトリの Actions タブから「Daily FX Data」を手動実行してください（SETUP.md 手順6）。";
  }
}
init();
</script>
</body>
</html>
